services:
  - type: web
    name: chat
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    dockerContext: .
    dockerfilePath: ./Dockerfile
    dockerCommand: bash /app/scripts/render-start.sh
    disk:
      name: codex-data
      mountPath: /app/storage
      sizeGB: 10
    envVars:
      - key: CHATMOCK_DATA_DIR
        value: /app/storage
      - key: CODEX_HOME
        value: /app/storage/.codex
      - key: CHATGPT_LOCAL_UPSTREAM
        value: codex-app-server
      - key: CHATGPT_LOCAL_CODEX_APP_SERVER_URL
        value: ws://127.0.0.1:8787
      - key: CHATMOCK_MANAGE_CODEX_APP_SERVER
        value: "true"
      - key: CHATMOCK_AUTO_START_CODEX_APP_SERVER
        value: "true"
      - key: CHATMOCK_DASHBOARD_ALLOW_UPLOAD
        value: "true"
      - key: CHATGPT_LOCAL_EXPOSE_REASONING_MODELS
        value: "true"
      - key: VERBOSE
        value: "false"
      - key: CODEX_AUTH_B64
        sync: false
      - key: CODEX_CONFIG_B64
        sync: false
